<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KSITM Learn Dashboard</title>
    <link href="../../../src/output.css" rel="stylesheet" />

    <!-- Font Awesome CDN -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />

    <script defer src="../js/portal.js"></script>
    <script src="../js/progress.js"></script>
    <script src="/Js/profile.js"></script>
    <script src="/Js/dashboard.js"></script>
  </head>
  <body class="bg-gray-100 font-sans min-h-screen flex flex-col">
    <!-- Header -->
    <header
      class="bg-violet-800 text-white shadow-md flex items-center justify-between px-6 py-4 relative"
    >
      <!-- Left: Course Name -->
      <h1 id="courseTitle" class="text-lg sm:text-xl font-bold">
        <!-- Filled dynamically with user course -->
      </h1>

      <!-- Right: Greeting + Avatar + Hamburger -->
      <div class="flex items-center gap-4">
        <!-- Greeting -->
        <span
          id="userGreeting"
          class="text-xs sm:text-sm font-medium text-white truncate max-w-[120px] sm:max-w-none"
        >
          <!-- Filled dynamically with user name -->
        </span>

        <!-- Avatar -->
        <i class="fas fa-user-circle text-3xl text-white"></i>

        <!-- Hamburger -->
        <button id="sidebarToggle" class="text-2xl focus:outline-none">
          <i class="fas fa-bars"></i>
        </button>
      </div>
    </header>

    <!-- Sidebar -->
    <nav
      id="sidebar"
      class="fixed top-0 right-0 h-full w-64 bg-violet-900 text-white transform translate-x-full transition-transform duration-300 ease-in-out z-50 shadow-lg flex flex-col"
    >
      <!-- Sidebar Header -->
      <div
        class="p-6 border-b border-violet-700 flex flex-col items-center space-y-2"
      >
        <!-- Avatar -->
        <img
          id="drawerProfilePic"
          src=""
          alt="Profile Picture"
          class="hidden w-16 h-16 rounded-full object-cover border-2 border-white shadow-md"
        />
        <div
          id="drawerDefaultAvatar"
          class="w-16 h-16 rounded-full bg-violet-700 flex items-center justify-center shadow-md"
        >
          <i class="fas fa-user text-white text-2xl"></i>
        </div>
        <p id="drawerProfileName" class="font-semibold text-sm">Guest</p>
        <p id="drawerProfileEmail" class="text-xs text-gray-300">
          Not Provided
        </p>

        <!-- ✅ Course Name -->
        <h2 id="sidebarCourse" class="text-lg font-bold mt-2">
          Learn Dashboard
        </h2>
      </div>

      <!-- Sidebar Links -->
      <div class="flex flex-col font-semibold divide-y divide-violet-700/40">
        <a
          href="./profile.html"
          class="flex items-center gap-4 px-6 py-4 hover:bg-violet-800 transition"
        >
          <i class="fas fa-user-circle text-xl text-violet-300"></i>
          <span>Profile</span>
        </a>
        <a
          href="./progress.html"
          class="flex items-center gap-4 px-6 py-4 hover:bg-violet-800 transition"
        >
          <i class="fas fa-chart-line text-xl text-violet-300"></i>
          <span>Progress</span>
        </a>
        <button
          id="logoutBtnDrawer"
          class="flex items-center gap-4 px-6 py-4 hover:bg-violet-800 transition text-left"
        >
          <i class="fas fa-sign-out-alt text-xl text-violet-300"></i>
          <span>Logout</span>
        </button>
      </div>
    </nav>

    <!-- Logout Confirmation Modal -->
    <div
      id="logoutModal"
      class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 px-4"
    >
      <div
        class="bg-white rounded-lg shadow-xl p-6 sm:p-8 transform scale-95 opacity-0 transition-all duration-300 w-full max-w-md text-center"
        id="logoutModalContent"
      >
        <div
          class="w-16 h-16 mx-auto mb-4 flex items-center justify-center rounded-full bg-red-500"
        >
          <i class="fas fa-sign-out-alt text-2xl text-white"></i>
        </div>
        <h3 class="text-lg font-bold mb-2">Confirm Logout</h3>
        <p class="text-gray-700 mb-4">Are you sure you want to log out?</p>
        <div class="flex justify-center gap-4">
          <button
            id="confirmLogoutBtn"
            class="bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded transition"
          >
            Yes, Logout
          </button>
          <button
            id="cancelLogoutBtn"
            class="bg-gray-300 hover:bg-gray-400 text-gray-800 px-4 py-2 rounded transition"
          >
            Cancel
          </button>
        </div>
      </div>
    </div>

    <!-- Overlay (hidden by default, appears when sidebar is open) -->
    <div
      id="sidebarOverlay"
      class="fixed inset-0 bg-black bg-opacity-30 backdrop-blur-sm hidden transition-opacity duration-300 ease-in-out z-40"
    ></div>

    <main class="px-4 sm:px-6 py-8 sm:py-17 space-y-6">
      <!-- Dynamic Course Cards -->
      <section
        id="class-progress"
        class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-4 sm:gap-6"
      ></section>
    </main>
    <!-- Access Restriction Overlay -->
    <div
      id="accessOverlay"
      class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50"
    >
      <div
        class="bg-white p-6 sm:p-8 rounded-lg shadow-xl max-w-md w-11/12 sm:w-full text-center transform transition-all duration-300 ease-out scale-95 opacity-0"
        id="accessModal"
      >
        <!-- Icon -->
        <div class="mb-6 flex justify-center">
          <i class="fas fa-lock text-violet-700 text-6xl animate-bounce"></i>
        </div>

        <!-- Heading -->
        <h2 class="text-2xl sm:text-3xl font-extrabold text-violet-800 mb-4">
          Access Restricted
        </h2>

        <!-- Message -->
        <p
          id="accessMessage"
          class="text-gray-700 text-sm sm:text-base font-medium leading-relaxed mb-6"
        ></p>

        <!-- Close Button -->
        <button
          id="closeOverlay"
          class="bg-violet-700 text-white px-6 py-2 rounded-lg font-semibold hover:bg-violet-800 transition-colors duration-300"
        >
          Close
        </button>
      </div>
    </div>

  </body>
</html>
